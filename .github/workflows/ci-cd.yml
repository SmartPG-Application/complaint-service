name: "SmartPG — Complaint Service CI/CD"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sonarqube:
    uses: SmartPG-Application/.github/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: "smartpg-complaint-service"
      service_path: "."
      sonar_project_key: "smartpg-complaint-service"
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  build-and-snyk:
    needs: sonarqube
    uses: SmartPG-Application/.github/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: "smartpg-complaint-service"
      service_path: "."
      node_version: "20"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  docker:
    needs: build-and-snyk
    uses: SmartPG-Application/.github/.github/workflows/template-docker.yml@main
    with:
      service_name: "smartpg-complaint-service"
      service_path: "."
      docker_image_name: "smartpg-complaint-service"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  approval:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: "smartpg-complaint-service"
      image_tag: ${{ needs.docker.outputs.version }}
      values_key: "complaint-service"
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  deploy:
    needs: [docker, approval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: SmartPG-Application/.github/.github/workflows/template-cd.yml@main
    with:
      service_name: "smartpg-complaint-service"
      values_key: "complaint-service"
      image_tag: ${{ needs.docker.outputs.version }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
